name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Engine unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --ignore-scripts skips the postinstall typegen (which needs a Databricks
      # connection); the deterministic-engine tests are pure TS and need none of it.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run deterministic eligibility-engine tests
        run: npx vitest run
